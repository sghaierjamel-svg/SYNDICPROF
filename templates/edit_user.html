{% extends 'base.html' %}
{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="text-white mb-1"><i class="bi bi-person-gear"></i> Modifier l'utilisateur</h2>
        <p style="color:var(--muted);">{{ u.email }}</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-pencil"></i> Coordonnées</div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label">Nom complet</label>
                        <input class="form-control" name="name" value="{{ u.name or '' }}" placeholder="Nom Prénom">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input class="form-control" name="email" type="email" value="{{ u.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-whatsapp" style="color:#25d366;"></i> Numéro WhatsApp
                        </label>
                        <input class="form-control" name="phone" type="tel"
                               value="{{ u.phone or '' }}" placeholder="+216 20 123 456">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rôle *</label>
                        <select class="form-select" name="role">
                            <option value="resident" {% if u.role == 'resident' %}selected{% endif %}>Résident</option>
                            <option value="admin"    {% if u.role == 'admin'    %}selected{% endif %}>Administrateur</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Appartement</label>
                        <select class="form-select" name="apartment_id">
                            <option value="">Aucun</option>
                            {% for a in apartments %}
                            <option value="{{ a.id }}" {% if u.apartment_id == a.id %}selected{% endif %}>
                                {{ a.block.name }}-{{ a.number }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <hr style="border-color:var(--border);">
                    <div class="mb-4">
                        <label class="form-label">Nouveau mot de passe
                            <small style="color:var(--muted);">(laisser vide pour ne pas changer)</small>
                        </label>
                        <input class="form-control" name="new_password" type="password"
                               placeholder="6 caractères minimum" minlength="6">
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{{ url_for('users') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Annuler
                        </a>
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check-circle"></i> Enregistrer les modifications
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
