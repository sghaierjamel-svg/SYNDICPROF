<!doctype html>
<html lang="fr">
<head>

    <title>Page introuvable — SyndicPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0A0E1A; color:#F9FAFB; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
        .code { font-size:6rem; font-weight:900; color:#00C896; line-height:1; }
        .msg { font-size:1.3rem; color:#9CA3AF; }
        .btn-home { background:#00C896; color:#0A0E1A; border:none; padding:.75rem 2rem; border-radius:10px; font-weight:700; text-decoration:none; }
        .btn-home:hover { background:#00b386; color:#0A0E1A; }
    </style>
</head>
<body>
    <div class="text-center px-3">
        <div class="code">404</div>
        <h2 class="mt-2 mb-2">Page introuvable</h2>
        <p class="msg mb-4">Cette page n'existe pas ou a été déplacée.</p>
        <a href="/" class="btn-home">Retour à l'accueil</a>
    </div>
</body>
</html>
