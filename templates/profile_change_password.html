{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="mb-4">
            <h2 class="text-white mb-1">
                <i class="bi bi-shield-lock"></i> Changer mon mot de passe
            </h2>
            <p class="text-muted">Modifiez votre mot de passe de connexion.</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-4">
                        <label class="form-label">Mot de passe actuel *</label>
                        <input type="password" name="current_password" class="form-control"
                               placeholder="Votre mot de passe actuel" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Nouveau mot de passe *</label>
                        <input type="password" name="new_password" class="form-control"
                               placeholder="Minimum 6 caractères" required minlength="6" id="newPwd">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Confirmer le nouveau mot de passe *</label>
                        <input type="password" name="confirm_password" class="form-control"
                               placeholder="Répétez le nouveau mot de passe" required minlength="6" id="confirmPwd">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Changer le mot de passe
                        </button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const p1 = document.getElementById('newPwd').value;
    const p2 = document.getElementById('confirmPwd').value;
    if (p1 !== p2) {
        e.preventDefault();
        alert('Les deux mots de passe ne correspondent pas.');
    }
});
</script>
{% endblock %}
