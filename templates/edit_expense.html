{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="text-white mb-4">
            <i class="bi bi-pencil"></i> Modifier la Dépense
        </h2>
        <a href="{{ url_for('expenses') }}" class="btn btn-light">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-credit-card"></i> Modifier Dépense #{{ expense.id }}
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label">Montant (DT) *</label>
                        <input class="form-control" name="amount" type="number"
                               step="0.01" value="{{ expense.amount }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date de Dépense *</label>
                        <input class="form-control" name="expense_date" type="date"
                               value="{{ expense.expense_date }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Intervenant / Catégorie</label>
                        <select class="form-select" name="category">
                            {% if intervenants %}
                            <optgroup label="── Intervenants enregistrés ──">
                                {% for iv in intervenants %}
                                <option value="iv:{{ iv.id }}"
                                    {% if expense.intervenant_id == iv.id %}selected{% endif %}>
                                    {{ iv.categorie }}
                                    {%- if iv.nom_societe %} — {{ iv.nom_societe }}
                                    {%- elif iv.prenom or iv.nom %} — {{ iv.prenom or '' }} {{ iv.nom or '' }}
                                    {%- endif %}
                                </option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="── Catégories standard ──">
                            {% endif %}
                                {% for cat in ['Eau','Électricité','Entretien','Réparations','Gardiennage','Assurances','Taxes','Salaire','Immobilisation','Autre'] %}
                                <option value="{{ cat }}"
                                    {% if not expense.intervenant_id and expense.category == cat %}selected{% endif %}>
                                    {{ cat }}
                                </option>
                                {% endfor %}
                            {% if intervenants %}
                            </optgroup>
                            {% endif %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3">{{ expense.description or '' }}</textarea>
                    </div>

                    <!-- Facture existante -->
                    {% if expense.facture_data %}
                    <div class="mb-3 p-3 rounded" style="background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);">
                        <div class="d-flex align-items-center justify-content-between">
                            <div>
                                {% if expense.facture_mime == 'application/pdf' %}
                                <i class="bi bi-file-earmark-pdf-fill" style="color:#f87171;font-size:1.4rem;"></i>
                                {% else %}
                                <i class="bi bi-image-fill" style="color:#00C896;font-size:1.4rem;"></i>
                                {% endif %}
                                <a href="{{ url_for('expense_facture', expense_id=expense.id) }}"
                                   target="_blank" style="color:#00C896;margin-left:.5rem;">
                                    {{ expense.facture_nom or 'Facture jointe' }}
                                </a>
                                <a href="{{ url_for('expense_facture', expense_id=expense.id, dl=1) }}"
                                   class="btn btn-sm btn-outline-secondary ms-2">
                                    <i class="bi bi-download"></i>
                                </a>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="supprimer_facture" value="1" id="delFacture">
                                <label class="form-check-label text-danger" for="delFacture"
                                       style="font-size:.82rem;">Supprimer</label>
                            </div>
                        </div>
                    </div>
                    {% endif %}

                    <!-- Nouvelle facture -->
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-paperclip"></i>
                            {% if expense.facture_data %}Remplacer la facture{% else %}Joindre une facture{% endif %}
                            <small style="color:var(--muted);"> (image ou PDF, max 5 Mo)</small>
                        </label>
                        <input class="form-control" type="file" name="facture"
                               accept="image/jpeg,image/png,image/webp,application/pdf">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Enregistrer les Modifications
                        </button>
                        <a href="{{ url_for('expenses') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
