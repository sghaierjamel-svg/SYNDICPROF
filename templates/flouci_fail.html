{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card text-center p-4">
            <div style="font-size:3rem;color:#ef4444;">❌</div>
            <h3 class="mt-3">Paiement annulé ou échoué</h3>
            <p class="text-muted">
                Votre paiement n'a pas abouti.<br>
                {% if fp %}Mois : <strong>{{ fp.month_target }}</strong>{% endif %}

            <a href="{{ url_for('residents_menu') }}" class="btn btn-primary mt-3">
                <i class="bi bi-house"></i> Retour à mon espace
            </a>
        </div>
    </div>
</div>
{% endblock %}
