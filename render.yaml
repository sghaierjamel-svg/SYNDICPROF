services:
  - type: web
    name: syndicpro
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SYNDICPRO_SECRET
        generateValue: true